name: Slack Daily PR Digest

on:
  schedule:
    - cron: '0 14 * * *'  # 9 AM CDT (UTC-5)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout org config
        uses: actions/checkout@v4
        with:
          repository: Saronic-Security/.github
          ref: main
          path: org-config

      - name: Fetch open PRs and post digest
        env:
          GH_TOKEN: ${{ secrets.ORG_READ_PAT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 << 'PYEOF'
          import json, os, re, sys
          from datetime import datetime, timezone
          from urllib.parse import urlparse
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError

          GH_TOKEN      = os.environ["GH_TOKEN"]
          SLACK_WEBHOOK = os.environ["SLACK_WEBHOOK_URL"]
          ORG           = "Saronic-Security"

          # ── Load GitHub → Slack user map ──
          users = {}  # github_username -> {slack, name}
          config_path = os.path.join("org-config", "repo-owners.yml")
          if os.path.exists(config_path):
              with open(config_path) as f:
                  raw = f.read()
              in_users = False
              current_user = None
              for line in raw.splitlines():
                  stripped = line.strip()
                  if stripped.startswith("#") or not stripped:
                      continue
                  if stripped == "users:":
                      in_users = True
                      continue
                  if in_users and not line.startswith(" ") and not line.startswith("\t"):
                      in_users = False
                      continue
                  if in_users:
                      user_match = re.match(r'^  (\S+):\s*$', line)
                      if user_match:
                          current_user = user_match.group(1)
                          users[current_user] = {}
                          continue
                      if current_user:
                          prop_match = re.match(r'^\s+(\w+):\s*(.+)', line)
                          if prop_match:
                              val = re.sub(r'\s+#.*$', '', prop_match.group(2)).strip()
                              users[current_user][prop_match.group(1)] = val

          def is_real_slack_id(sid):
              return bool(sid) and re.fullmatch(r'U[A-Z0-9]{8,12}', sid) and 'XXXX' not in sid

          def get_slack_tag(github_username):
              info = users.get(github_username, {})
              sid = info.get("slack", "")
              return f"<@{sid}>" if is_real_slack_id(sid) else None

          # ── Auto-detect repo owner (top contributor) with caching ──
          owner_cache = {}  # repo_name -> slack_tag or None

          def get_repo_owner_tag(repo_name):
              if repo_name in owner_cache:
                  return owner_cache[repo_name]
              tag = None
              try:
                  req = Request(
                      f"https://api.github.com/repos/{ORG}/{repo_name}/contributors?per_page=1&anon=false",
                      headers={
                          "Authorization": f"Bearer {GH_TOKEN}",
                          "Accept": "application/vnd.github+json",
                          "X-GitHub-Api-Version": "2022-11-28",
                      },
                  )
                  with urlopen(req) as resp:
                      contributors = json.loads(resp.read())
                  if contributors and isinstance(contributors, list):
                      tag = get_slack_tag(contributors[0]["login"])
              except Exception as e:
                  print(f"Warning: could not fetch contributors for {repo_name}: {e}", file=sys.stderr)
              owner_cache[repo_name] = tag
              return tag

          # ── Fetch all open non-draft PRs ──
          prs = []
          total_count = 0
          url = (
              "https://api.github.com/search/issues"
              "?q=org:Saronic-Security+is:pr+is:open+draft:false"
              "&per_page=100&sort=created&order=asc"
          )

          while url:
              req = Request(url, headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              })
              try:
                  with urlopen(req) as resp:
                      data = json.loads(resp.read())
                      if "message" in data:
                          print(f"GitHub API error: {data['message']}", file=sys.stderr)
                          sys.exit(1)
                      if not prs:
                          total_count = data.get("total_count", 0)
                      prs.extend(data.get("items", []))
                      link_header = resp.headers.get("Link", "")
                      url = None
                      for part in link_header.split(","):
                          if 'rel="next"' in part:
                              candidate = part.split(";")[0].strip().strip("<>")
                              if urlparse(candidate).netloc == "api.github.com":
                                  url = candidate
              except HTTPError as e:
                  print(f"HTTP {e.code}: {e.reason}", file=sys.stderr)
                  sys.exit(1)

          if not prs:
              print("No open PRs — skipping digest")
              sys.exit(0)

          # ── Categorize PRs by age ──
          now = datetime.now(timezone.utc)
          stale = []     # 3+ days
          aging = []     # 1-2 days
          fresh = []     # <1 day
          repo_set = set()

          for pr in prs:
              created = datetime.fromisoformat(pr["created_at"].replace("Z", "+00:00"))
              age_hours = (now - created).total_seconds() / 3600
              age_days = int(age_hours // 24)
              repo = pr["repository_url"].split("/")[-1]
              repo_set.add(repo)
              num = pr["number"]
              title = pr["title"]
              author = pr["user"]["login"]
              pr_url = pr.get("html_url", f"https://github.com/{ORG}/{repo}/pull/{num}")
              owner_tag = get_repo_owner_tag(repo)

              entry = f"  • <{pr_url}|{repo} #{num}> — {title} (by {author}, {age_days}d old)"
              if owner_tag:
                  entry += f" → {owner_tag}"

              if age_hours >= 72:
                  stale.append((age_days, entry))
              elif age_hours >= 24:
                  aging.append((age_days, entry))
              else:
                  fresh.append((age_days, entry))

          stale.sort(key=lambda x: -x[0])
          aging.sort(key=lambda x: -x[0])

          # ── Build message ──
          today = now.strftime("%A %b %-d")
          total = len(prs)
          lines = [f"*Daily PR Digest* — {today}", ""]

          parts = []
          if stale:
              parts.append(f"*{len(stale)}* stale (3+ days)")
          if aging:
              parts.append(f"*{len(aging)}* aging (1-2 days)")
          if fresh:
              parts.append(f"*{len(fresh)}* fresh (today)")
          lines.append(f"{total} open PRs across {len(repo_set)} repos: " + ", ".join(parts))
          lines.append("")

          if stale:
              lines.append(f":red_circle: *{len(stale)} PRs haven't been merged in 3+ days:*")
              lines.extend([e for _, e in stale])
              lines.append("")

          if aging:
              lines.append(f":large_yellow_circle: *{len(aging)} PRs open 1-2 days:*")
              lines.extend([e for _, e in aging])
              lines.append("")

          if fresh:
              lines.append(f":large_green_circle: *{len(fresh)} PRs opened today:*")
              lines.extend([e for _, e in fresh])
              lines.append("")

          if total_count > len(prs):
              lines.append(f"_Showing {len(prs)} of {total_count} (GitHub API limit)_")

          payload = json.dumps({"text": "\n".join(lines)})
          print("\n".join(lines))

          # ── Post to Slack ──
          req = Request(
              SLACK_WEBHOOK,
              data=payload.encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urlopen(req) as resp:
                  body = resp.read().decode().strip()
          except HTTPError as e:
              print(f"Slack HTTP {e.code}: {e.reason}", file=sys.stderr)
              sys.exit(1)
          if body != "ok":
              print(f"Slack error: {body}", file=sys.stderr)
              sys.exit(1)
          PYEOF
