name: Slack Daily PR Digest

on:
  schedule:
    - cron: '0 14 * * *'  # 9 AM CDT (UTC-5)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch open PRs and post digest
        env:
          GH_TOKEN: ${{ secrets.ORG_READ_PAT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 << 'PYEOF'
          import base64, json, os, re, sys
          from collections import defaultdict
          from datetime import datetime, timezone
          from urllib.parse import urlparse
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError

          GH_TOKEN      = os.environ["GH_TOKEN"]
          SLACK_WEBHOOK = os.environ["SLACK_WEBHOOK_URL"]
          ORG           = "Saronic-Security"

          def gh_api(path):
              try:
                  req = Request(
                      f"https://api.github.com{path}",
                      headers={
                          "Authorization": f"Bearer {GH_TOKEN}",
                          "Accept": "application/vnd.github+json",
                          "X-GitHub-Api-Version": "2022-11-28",
                      },
                  )
                  with urlopen(req) as resp:
                      return json.loads(resp.read())
              except Exception as e:
                  print(f"Warning: GitHub API error for {path}: {e}", file=sys.stderr)
                  return None

          # ── Load GitHub → Slack user map via API ──
          users = {}
          raw = gh_api("/repos/Saronic-Security/.github/contents/repo-owners.yml")
          if raw and raw.get("content"):
              content = base64.b64decode(raw["content"]).decode()
              in_users = False
              current_user = None
              for line in content.splitlines():
                  stripped = line.strip()
                  if stripped.startswith("#") or not stripped:
                      continue
                  if stripped == "users:":
                      in_users = True
                      continue
                  if in_users and not line.startswith(" ") and not line.startswith("\t"):
                      in_users = False
                      continue
                  if in_users:
                      user_match = re.match(r'^  (\S+):\s*$', line)
                      if user_match:
                          current_user = user_match.group(1)
                          users[current_user] = {}
                          continue
                      if current_user:
                          prop_match = re.match(r'^\s+(\w+):\s*(.+)', line)
                          if prop_match:
                              val = re.sub(r'\s+#.*$', '', prop_match.group(2)).strip()
                              users[current_user][prop_match.group(1)] = val

          def is_real_slack_id(sid):
              return bool(sid) and re.fullmatch(r'U[A-Z0-9]{8,12}', sid) and 'XXXX' not in sid

          def get_slack_tag(github_username):
              info = users.get(github_username, {})
              sid = info.get("slack", "")
              return f"<@{sid}>" if is_real_slack_id(sid) else None

          def get_display_name(github_username):
              info = users.get(github_username, {})
              return info.get("name", github_username)

          # ── Auto-detect repo owner (top contributor) with caching ──
          owner_cache = {}  # repo_name -> (github_login, slack_tag)

          def get_repo_owner(repo_name):
              if repo_name in owner_cache:
                  return owner_cache[repo_name]
              result = (None, None)
              contributors = gh_api(f"/repos/{ORG}/{repo_name}/contributors?per_page=1&anon=false")
              if contributors and isinstance(contributors, list):
                  login = contributors[0]["login"]
                  tag = get_slack_tag(login)
                  result = (login, tag)
              owner_cache[repo_name] = result
              return result

          # ── Fetch all open non-draft PRs ──
          prs = []
          total_count = 0
          url = (
              "https://api.github.com/search/issues"
              "?q=org:Saronic-Security+is:pr+is:open+draft:false"
              "&per_page=100&sort=created&order=asc"
          )

          while url:
              req = Request(url, headers={
                  "Authorization": f"Bearer {GH_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              })
              try:
                  with urlopen(req) as resp:
                      data = json.loads(resp.read())
                      if "message" in data:
                          print(f"GitHub API error: {data['message']}", file=sys.stderr)
                          sys.exit(1)
                      if not prs:
                          total_count = data.get("total_count", 0)
                      prs.extend(data.get("items", []))
                      link_header = resp.headers.get("Link", "")
                      url = None
                      for part in link_header.split(","):
                          if 'rel="next"' in part:
                              candidate = part.split(";")[0].strip().strip("<>")
                              if urlparse(candidate).netloc == "api.github.com":
                                  url = candidate
              except HTTPError as e:
                  print(f"HTTP {e.code}: {e.reason}", file=sys.stderr)
                  sys.exit(1)

          if not prs:
              print("No open PRs — skipping digest")
              sys.exit(0)

          # ── Categorize PRs by age, then by owner within each bucket ──
          now = datetime.now(timezone.utc)
          # bucket_key -> owner_key -> list of (age_days, entry)
          # bucket_key: 0=stale, 1=aging, 2=fresh
          # owner_key: (owner_login or "_unknown", display_label)
          buckets = {0: defaultdict(list), 1: defaultdict(list), 2: defaultdict(list)}
          bucket_counts = {0: 0, 1: 0, 2: 0}
          repo_set = set()

          for pr in prs:
              created = datetime.fromisoformat(pr["created_at"].replace("Z", "+00:00"))
              age_hours = (now - created).total_seconds() / 3600
              age_days = int(age_hours // 24)
              repo = pr["repository_url"].split("/")[-1]
              repo_set.add(repo)
              num = pr["number"]
              title = pr["title"]
              author = pr["user"]["login"]
              pr_url = pr.get("html_url", f"https://github.com/{ORG}/{repo}/pull/{num}")

              owner_login, owner_tag = get_repo_owner(repo)

              entry = f"      \u2022 <{pr_url}|#{num}> \u2014 {title} (by {author}, {age_days}d)"

              if owner_login:
                  label = f"{owner_tag} \u2014 {repo}" if owner_tag else f"{owner_login} \u2014 {repo}"
                  owner_key = (owner_login, label)
              else:
                  owner_key = ("_unknown", f"{repo}")

              if age_hours >= 72:
                  buckets[0][owner_key].append((age_days, entry))
                  bucket_counts[0] += 1
              elif age_hours >= 24:
                  buckets[1][owner_key].append((age_days, entry))
                  bucket_counts[1] += 1
              else:
                  buckets[2][owner_key].append((age_days, entry))
                  bucket_counts[2] += 1

          # ── Build message ──
          today = now.strftime("%A %b %-d")
          total = len(prs)
          lines = [f"*Daily PR Digest* \u2014 {today}", ""]

          parts = []
          if bucket_counts[0]:
              parts.append(f"*{bucket_counts[0]}* stale (3+ days)")
          if bucket_counts[1]:
              parts.append(f"*{bucket_counts[1]}* aging (1\u20132 days)")
          if bucket_counts[2]:
              parts.append(f"*{bucket_counts[2]}* fresh (today)")
          lines.append(f"{total} open PRs across {len(repo_set)} repos: " + ", ".join(parts))
          lines.append("")

          bucket_labels = {
              0: (":red_circle:", "PRs haven\u2019t been merged in 3+ days"),
              1: (":large_yellow_circle:", "PRs open 1\u20132 days"),
              2: (":large_green_circle:", "PRs opened today"),
          }

          for bucket_key in [0, 1, 2]:
              if not buckets[bucket_key]:
                  continue
              emoji, label = bucket_labels[bucket_key]
              lines.append(f"{emoji} *{bucket_counts[bucket_key]} {label}:*")
              lines.append("")

              # Sort owners alphabetically, _unknown last
              sorted_owners = sorted(
                  buckets[bucket_key].items(),
                  key=lambda x: (x[0][0] == "_unknown", x[0][0].lower()),
              )

              for (owner_login, owner_label), entries in sorted_owners:
                  lines.append(f"    *{owner_label}*")
                  # Sort by oldest first within each owner
                  entries.sort(key=lambda x: -x[0])
                  for _, entry in entries:
                      lines.append(entry)
                  lines.append("")

          if total_count > len(prs):
              lines.append(f"_Showing {len(prs)} of {total_count} (GitHub API limit)_")

          payload = json.dumps({"text": "\n".join(lines)})
          print("\n".join(lines))

          # ── Post to Slack ──
          req = Request(
              SLACK_WEBHOOK,
              data=payload.encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urlopen(req) as resp:
                  body = resp.read().decode().strip()
          except HTTPError as e:
              print(f"Slack HTTP {e.code}: {e.reason}", file=sys.stderr)
              sys.exit(1)
          if body != "ok":
              print(f"Slack error: {body}", file=sys.stderr)
              sys.exit(1)
          PYEOF
