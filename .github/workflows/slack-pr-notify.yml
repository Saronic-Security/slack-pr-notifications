name: Slack PR Notification

on:
  pull_request:
    types: [opened, ready_for_review, closed]

permissions:
  contents: read

jobs:
  notify-opened:
    if: >-
      (github.event.action == 'opened' && github.event.pull_request.draft == false) ||
      github.event.action == 'ready_for_review'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.ORG_READ_PAT }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO_FULL: ${{ github.event.repository.full_name }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_DELETIONS: ${{ github.event.pull_request.deletions }}
          PR_CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
        run: |
          python3 - << 'PYEOF'
          import base64, json, os, re, sys
          from urllib.parse import urlparse
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError

          author    = os.environ["PR_AUTHOR"]
          title     = os.environ["PR_TITLE"]
          url       = os.environ["PR_URL"]
          repo_full = os.environ["REPO_FULL"]
          repo      = os.environ["REPO_NAME"]
          webhook   = os.environ["SLACK_WEBHOOK_URL"]
          gh_token  = os.environ.get("GH_TOKEN", "")
          body      = os.environ.get("PR_BODY", "") or ""
          additions = os.environ.get("PR_ADDITIONS", "?")
          deletions = os.environ.get("PR_DELETIONS", "?")
          changed   = os.environ.get("PR_CHANGED_FILES", "?")

          parsed = urlparse(webhook)
          if not parsed.netloc.endswith(".slack.com"):
              print(f"Webhook URL does not point to slack.com: {parsed.netloc}", file=sys.stderr)
              sys.exit(1)

          def escape_mrkdwn(s):
              return s.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")

          def gh_api(path):
              if not gh_token:
                  return None
              try:
                  req = Request(
                      f"https://api.github.com{path}",
                      headers={
                          "Authorization": f"Bearer {gh_token}",
                          "Accept": "application/vnd.github+json",
                          "X-GitHub-Api-Version": "2022-11-28",
                      },
                  )
                  with urlopen(req) as resp:
                      return json.loads(resp.read())
              except Exception as e:
                  print(f"Warning: GitHub API error for {path}: {e}", file=sys.stderr)
                  return None

          # ── Load GitHub → Slack user map via API ──
          users = {}
          raw = gh_api("/repos/Saronic-Security/.github/contents/repo-owners.yml")
          if raw and raw.get("content"):
              content = base64.b64decode(raw["content"]).decode()
              in_users = False
              current_user = None
              for line in content.splitlines():
                  stripped = line.strip()
                  if stripped.startswith("#") or not stripped:
                      continue
                  if stripped == "users:":
                      in_users = True
                      continue
                  if in_users and not line.startswith(" ") and not line.startswith("\t"):
                      in_users = False
                      continue
                  if in_users:
                      user_match = re.match(r'^  (\S+):\s*$', line)
                      if user_match:
                          current_user = user_match.group(1)
                          users[current_user] = {}
                          continue
                      if current_user:
                          prop_match = re.match(r'^\s+(\w+):\s*(.+)', line)
                          if prop_match:
                              val = re.sub(r'\s+#.*$', '', prop_match.group(2)).strip()
                              users[current_user][prop_match.group(1)] = val

          def is_real_slack_id(sid):
              return bool(sid) and re.fullmatch(r'U[A-Z0-9]{8,12}', sid) and 'XXXX' not in sid

          def get_slack_tag(github_username):
              info = users.get(github_username, {})
              sid = info.get("slack", "")
              return f"<@{sid}>" if is_real_slack_id(sid) else None

          # ── Auto-detect repo owner (top contributor) ──
          owner_tag = None
          contributors = gh_api(f"/repos/{repo_full}/contributors?per_page=1&anon=false")
          if contributors and isinstance(contributors, list):
              top = contributors[0]["login"]
              owner_tag = get_slack_tag(top)

          # ── Summarize the PR body ──
          summary = ""
          if body:
              for line in body.splitlines():
                  line = line.strip()
                  if line and not line.startswith("#") and not line.startswith("<!--"):
                      summary = line[:200]
                      if len(line) > 200:
                          summary += "..."
                      break

          # ── Build Block Kit payload ──
          safe_author = escape_mrkdwn(author)
          safe_title = escape_mrkdwn(title)
          safe_repo = escape_mrkdwn(repo)
          file_word = "file" if changed == "1" else "files"

          blocks = []

          blocks.append({
              "type": "section",
              "text": {"type": "mrkdwn", "text": f":zap: *{safe_repo}*"},
          })

          blocks.append({
              "type": "section",
              "text": {"type": "mrkdwn", "text": f"{safe_author}  \u2192  *{safe_title}*"},
          })

          if summary:
              blocks.append({
                  "type": "section",
                  "text": {"type": "mrkdwn", "text": f">{escape_mrkdwn(summary)}"},
              })

          blocks.append({
              "type": "section",
              "text": {"type": "mrkdwn", "text": f"`+{additions}` `-{deletions}` \u00b7 {changed} {file_word}"},
              "accessory": {
                  "type": "button",
                  "text": {"type": "plain_text", "text": "View PR", "emoji": True},
                  "url": url,
                  "style": "primary",
              },
          })

          mention = owner_tag if owner_tag else "<!channel>"
          blocks.append({
              "type": "context",
              "elements": [{"type": "mrkdwn", "text": f"{mention} \u00b7 {repo_full}"}],
          })

          fallback = f"{author} opened a PR on {repo}: {title}"
          payload = json.dumps({"text": fallback, "blocks": blocks})

          req = Request(webhook, data=payload.encode(), headers={"Content-Type": "application/json"}, method="POST")
          try:
              with urlopen(req) as resp:
                  resp_body = resp.read().decode().strip()
          except HTTPError as e:
              print(f"Slack HTTP {e.code}: {e.reason}", file=sys.stderr)
              sys.exit(1)
          if resp_body != "ok":
              print(f"Slack error: {resp_body}", file=sys.stderr)
              sys.exit(1)
          PYEOF

  notify-merged:
    if: >-
      github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Post merge notification to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO_FULL: ${{ github.event.repository.full_name }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_DELETIONS: ${{ github.event.pull_request.deletions }}
          PR_COMMITS: ${{ github.event.pull_request.commits }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 - << 'PYEOF'
          import json, os, sys
          from urllib.parse import urlparse
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError

          merged_by = os.environ["PR_MERGED_BY"]
          title     = os.environ["PR_TITLE"]
          url       = os.environ["PR_URL"]
          repo_full = os.environ["REPO_FULL"]
          repo      = os.environ["REPO_NAME"]
          webhook   = os.environ["SLACK_WEBHOOK_URL"]
          additions = os.environ.get("PR_ADDITIONS", "?")
          deletions = os.environ.get("PR_DELETIONS", "?")
          commits   = os.environ.get("PR_COMMITS", "?")
          pr_num    = os.environ.get("PR_NUMBER", "?")

          parsed = urlparse(webhook)
          if not parsed.netloc.endswith(".slack.com"):
              print(f"Webhook URL does not point to slack.com: {parsed.netloc}", file=sys.stderr)
              sys.exit(1)

          def escape_mrkdwn(s):
              return s.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")

          safe_merged_by = escape_mrkdwn(merged_by)
          safe_title = escape_mrkdwn(title)
          safe_repo = escape_mrkdwn(repo)
          commit_word = "commit" if commits == "1" else "commits"

          blocks = []

          blocks.append({
              "type": "section",
              "text": {"type": "mrkdwn", "text": f":white_check_mark: *{safe_repo}*"},
          })

          blocks.append({
              "type": "section",
              "text": {"type": "mrkdwn", "text": f"{safe_merged_by} merged *{safe_title}*"},
          })

          blocks.append({
              "type": "section",
              "text": {"type": "mrkdwn", "text": f"{commits} {commit_word} \u00b7 `+{additions}` `-{deletions}`"},
              "accessory": {
                  "type": "button",
                  "text": {"type": "plain_text", "text": "View PR", "emoji": True},
                  "url": url,
              },
          })

          blocks.append({
              "type": "context",
              "elements": [{"type": "mrkdwn", "text": f"{repo_full} #{pr_num}"}],
          })

          fallback = f"{merged_by} merged #{pr_num} on {repo}: {title}"
          payload = json.dumps({"text": fallback, "blocks": blocks})

          req = Request(webhook, data=payload.encode(), headers={"Content-Type": "application/json"}, method="POST")
          try:
              with urlopen(req) as resp:
                  resp_body = resp.read().decode().strip()
          except HTTPError as e:
              print(f"Slack HTTP {e.code}: {e.reason}", file=sys.stderr)
              sys.exit(1)
          if resp_body != "ok":
              print(f"Slack error: {resp_body}", file=sys.stderr)
              sys.exit(1)
          PYEOF
