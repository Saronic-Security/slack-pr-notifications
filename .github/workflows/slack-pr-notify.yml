name: Slack PR Notification

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  contents: read

jobs:
  # ── Notify Slack on new ready-for-review PR ────────────────────
  # NOTE: <!channel> is intentional — spec requires @channel so all reviewers
  # see the notification immediately.
  notify:
    # opened + non-draft: fires when a new PR is created directly as ready
    # ready_for_review: fires when a draft is converted to ready
    if: >-
      (github.event.action == 'opened' && github.event.pull_request.draft == false) ||
      github.event.action == 'ready_for_review'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # Build the full JSON payload in Python to safely handle any special
          # characters in PR_TITLE, PR_AUTHOR, or PR_URL without injection risk.
          # Uses urllib (not subprocess+curl) to avoid exposing secrets in process table.
          python3 - << 'PYEOF'
          import json, os, sys
          from urllib.parse import urlparse
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError

          author   = os.environ["PR_AUTHOR"]
          title    = os.environ["PR_TITLE"]
          url      = os.environ["PR_URL"]
          repo     = os.environ["REPO_NAME"]
          webhook  = os.environ["SLACK_WEBHOOK_URL"]

          # Validate webhook URL points to Slack (defense-in-depth)
          parsed = urlparse(webhook)
          if not parsed.netloc.endswith(".slack.com"):
              print(f"Webhook URL does not point to slack.com: {parsed.netloc}", file=sys.stderr)
              sys.exit(1)

          # Escape Slack mrkdwn special characters to prevent phishing via crafted PR titles
          def escape_mrkdwn(s):
              return s.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")

          safe_title  = escape_mrkdwn(title)
          safe_author = escape_mrkdwn(author)

          text = f"<!channel> *{safe_author}* opened a PR on *{repo}*\n:pencil: {safe_title}\n:link: {url}"
          payload = json.dumps({"text": text})

          req = Request(
              webhook,
              data=payload.encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urlopen(req) as resp:
                  body = resp.read().decode().strip()
          except HTTPError as e:
              print(f"Slack HTTP {e.code}: {e.reason}", file=sys.stderr)
              sys.exit(1)
          # Slack returns HTTP 200 even for application-level errors (e.g. bad payload)
          # with a non-"ok" response body.
          if body != "ok":
              print(f"Slack error: {body}", file=sys.stderr)
              sys.exit(1)
          PYEOF
